name: "Daily Learning"

on:
  schedule:
    - cron: "0 14 * * *" # 10 AM EST = 14 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run daily learning script
        run: npx tsx scripts/daily-learning.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push generated thesis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/
          git commit -m "docs: auto-generate daily learning thesis [skip ci]" || echo "No changes to commit"
          git push
